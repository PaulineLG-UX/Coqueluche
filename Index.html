<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COQUELUCHE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--p:#f2e4c0;--p2:#e4d4a8;--ink:#1e1208;--ink2:#4a3020;--ink3:#8a7060;--red:#8b1a1a;--gold:#b8860b;--bd:rgba(30,18,8,.18);}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0e06;color:var(--ink);font-family:'IM Fell English',Georgia,serif;-webkit-tap-highlight-color:transparent;user-select:none;}
.screen{display:none;}.screen.active{display:flex;}
.menu{width:100vw;height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:2rem 1.2rem;background:var(--p);position:relative;overflow:hidden;background-image:radial-gradient(ellipse at 15% 20%,rgba(184,134,11,.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 80%,rgba(139,26,26,.05) 0%,transparent 55%);}
.menu::before,.menu::after{content:'✦';position:absolute;font-size:22px;color:var(--gold);opacity:.35;}.menu::before{top:16px;left:22px;}.menu::after{bottom:16px;right:22px;}
.orn{position:absolute;font-size:22px;color:var(--gold);opacity:.35;}.orn.tr{top:16px;right:22px;}.orn.bl{bottom:16px;left:22px;}
.logo{font-family:'Cinzel',serif;font-size:clamp(42px,10vw,90px);font-weight:700;letter-spacing:.08em;text-align:center;line-height:1;}.logo em{color:var(--red);font-style:normal;}.logo.sm{font-size:clamp(26px,5vw,46px);}
.tag{font-style:italic;font-size:15px;color:var(--ink3);text-align:center;margin-top:-10px;}
.divider{display:flex;align-items:center;gap:10px;width:100%;max-width:340px;color:var(--gold);font-size:13px;opacity:.5;}.divider::before,.divider::after{content:'';flex:1;height:.5px;background:var(--gold);opacity:.5;}
input[type=text]{width:100%;max-width:340px;background:transparent;border:none;border-bottom:.5px solid var(--bd);color:var(--ink);font-family:'IM Fell English',serif;font-size:17px;font-style:italic;padding:10px 0;outline:none;text-align:center;transition:border-color .2s;}
input[type=text]:focus{border-color:var(--ink2);}input[type=text]::placeholder{color:var(--ink3);font-style:italic;}
#inp-code{font-family:'Cinzel',serif;font-size:22px;font-style:normal;letter-spacing:.3em;text-transform:uppercase;}
.brow{display:flex;gap:10px;width:100%;max-width:340px;}.brow button{flex:1;}
button{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:12px 20px;background:transparent;border:.5px solid var(--bd);color:var(--ink2);cursor:pointer;transition:background .15s,color .15s,transform .1s;}
button:hover{background:var(--p2);color:var(--ink);}button:active{transform:scale(.97);}button:disabled{opacity:.3;cursor:default;}
button.pri{background:var(--ink);border-color:var(--ink);color:var(--p);}button.pri:hover{background:var(--ink2);}
#join-form{display:none;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:340px;}#join-form.open{display:flex;}
.msg{font-size:12px;font-style:italic;color:var(--ink3);min-height:16px;text-align:center;}.msg.err{color:var(--red);font-style:normal;}
.cbox{border:.5px solid var(--bd);padding:20px 36px;text-align:center;width:100%;max-width:380px;position:relative;}.cbox::before,.cbox::after{content:'◆';position:absolute;font-size:9px;color:var(--gold);opacity:.45;}.cbox::before{top:-5px;left:50%;transform:translateX(-50%);}.cbox::after{bottom:-5px;left:50%;transform:translateX(-50%);}
.clabel{font-size:9px;font-family:'Cinzel',serif;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}.cval{font-family:'Cinzel',serif;font-size:48px;font-weight:700;letter-spacing:.15em;color:var(--red);}
.plist{display:flex;flex-direction:column;width:100%;max-width:340px;max-height:32vh;overflow-y:auto;border:.5px solid var(--bd);}.pitem{padding:9px 14px;font-size:14px;font-style:italic;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:.5px solid rgba(30,18,8,.05);}.pitem:last-child{border-bottom:none;}.pitem.me{background:rgba(0,0,0,.03);}.pitem .badge{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);font-style:normal;white-space:nowrap;}
#gc{width:100vw;height:100vh;}.screen.active#gc{display:block;}
#screen-results{width:100vw;height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:2rem 1.2rem;overflow-y:auto;background:var(--p);}
.rtitle{font-family:'Cinzel',serif;font-size:clamp(36px,8vw,70px);font-weight:700;text-align:center;line-height:1;letter-spacing:.04em;}
.rlist{display:flex;flex-direction:column;width:100%;max-width:460px;border:.5px solid var(--bd);}.rrow{display:grid;grid-template-columns:28px 1fr auto 72px;gap:8px;align-items:center;padding:10px 14px;font-size:14px;font-style:italic;border-bottom:.5px solid rgba(30,18,8,.05);}.rrow:last-child{border-bottom:none;}.rrow.me{background:rgba(0,0,0,.04);}
.rn{font-family:'Cinzel',serif;font-size:9px;color:var(--ink3);font-style:normal;}.rname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.rst{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-style:normal;}.rrow.inf .rst{color:var(--red);}.rrow.sur .rst{color:#2a5a2a;}.rsc{font-family:'Cinzel',serif;font-size:11px;color:var(--ink3);text-align:right;font-style:normal;}
</style>
</head>
<body>

<div id="screen-lobby" class="screen menu active">
  <span class="orn tr">✦</span><span class="orn bl">✦</span>
  <div class="logo">COQUE<em>LUCHE</em></div>
  <div class="tag">Jeu médiéval d'infection</div>
  <div class="divider">❧</div>
  <input id="inp-name" type="text" placeholder="Votre nom" maxlength="14" autocomplete="off">
  <div class="brow"><button class="pri" id="btn-create">Créer partie</button><button id="btn-join-toggle">Rejoindre</button></div>
  <div id="join-form">
    <input id="inp-code" type="text" placeholder="CODE" maxlength="6" autocomplete="off">
    <button class="pri" id="btn-join" style="width:100%">Rejoindre →</button>
  </div>
  <button id="btn-solo" style="width:100%;max-width:340px;opacity:.6">⚔ Entraînement — bots ×7</button>
  <div class="msg" id="lmsg"></div>
</div>
<div id="screen-waiting" class="screen menu">
  <span class="orn tr">✦</span><span class="orn bl">✦</span>
  <div class="logo sm">COQUE<em>LUCHE</em></div>
  <div class="tag" style="margin-bottom:8px">Salle d'attente</div>
  <div class="cbox" id="cbox"><div class="clabel">Code de la partie</div><div class="cval" id="room-code">——</div></div>
  <div class="plist" id="plist"></div>
  <div style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px;margin-top:6px">
    <button class="pri" id="btn-start" style="display:none">Commencer →</button>
    <div class="msg" id="wmsg">En attente...</div>
  </div>
</div>
<canvas id="gc" class="screen"></canvas>

<script>
'use strict';
const GW=1600,GH=900,R=14,SPEED=240,IDIST=R*2.7,DUR=60,NHTZ=20;
const ROLES_SAIN=['le Forgeron','la Tisserande','le Meunier',"l'Apothicaire","l'Aubergiste",'le Charpentier','la Herboriste','le Garde','le Boulanger','le Marchand','la Servante','le Clerc','le Tanneur','la Lavandiere','le Palefrenier',"l'Archer"];
const ROLE_MALADE='le Voyageur';
function assignRoles(players){
  const pool=[...ROLES_SAIN];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  let ri=0;
  Object.values(players).forEach(p=>{p.role=p.infected?ROLE_MALADE:(pool[ri++]||ROLES_SAIN[0]);});
}

];

function inShelter(wx,wy){

let peer=null,myId=null,myName='Voyageur',isHost=false;
let hostConn=null,cConns={},players={};
let myX=800,myY=450,myInf=false,myScore=0;
let running=false,timeLeft=DUR,lastTs=0,lastNet=0;
let parts=[],flashA=0,soloMode=false,keys={},tVec={x:0,y:0},tStart=null;
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
let W=0,H=0,gSc=1,gOX=0,gOY=0;

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function d2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2;}
function rnd(a,b){return a+Math.random()*(b-a);}
function bcast(m){Object.values(cConns).forEach(c=>{if(c.open)c.send(m);});}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('gc').style.display=(id==='gc')?'block':'none';
  document.getElementById(id).classList.add('active');
}
function lmsg(t,e){const el=document.getElementById('lmsg');el.textContent=t;el.className='msg'+(e?' err':'');}
function wmsg(t){document.getElementById('wmsg').textContent=t;}

function mkPlayer(id,name,isBot){
  return{id,name,x:800+rnd(-200,200),y:450+rnd(-150,150),
    infected:false,score:0,isBot:!!isBot,role:'',
    shelterTime:0,shelterCd:0,wpTimer:0,targetX:null,targetY:null};
}
function mkCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}
function gname(){return document.getElementById('inp-name').value.trim().slice(0,14)||'Voyageur';}

document.getElementById('btn-create').onclick=doCreate;
document.getElementById('btn-join-toggle').onclick=()=>document.getElementById('join-form').classList.toggle('open');
document.getElementById('btn-join').onclick=doJoin;
document.getElementById('inp-code').addEventListener('keydown',e=>{if(e.key==='Enter')doJoin();});

/* ══ SOLO ══ */
const BOT_NAMES=['Théodore','Bertrand','Mathilde','Ségolène','Arnaud','Clémence','Gauthier','Isabelle'];
function doSolo(){
  myName=gname();myId='player';isHost=true;soloMode=true;players={};
  players[myId]=mkPlayer(myId,myName,false);
  for(let i=0;i<7;i++){const bid='bot'+i;players[bid]=mkPlayer(bid,BOT_NAMES[i],true);}
  const ids=Object.keys(players);
  ids.forEach((id,i)=>{const a=(i/ids.length)*Math.PI*2;players[id].x=clamp(GW/2+Math.cos(a)*360+rnd(-40,40),R,GW-R);players[id].y=clamp(GH/2+Math.sin(a)*220+rnd(-40,40),R,GH-R);});
  const infId=ids[Math.floor(Math.random()*ids.length)];
  ids.forEach(id=>{players[id].infected=(id===infId);players[id].score=0;});
  assignRoles(players);
  myX=players[myId].x;myY=players[myId].y;myInf=players[myId].infected;myScore=0;
  timeLeft=DUR;running=true;parts=[];flashA=myInf?0.5:0;lastTs=0;lastNet=0;
  resizeCv();showRoleCard(()=>{show('gc');requestAnimationFrame(loop);});
}

/* ══ NETWORK ══ */
function doCreate(){
  myName=gname();isHost=true;lmsg('Connexion...');const code=mkCode();
  peer=new Peer(code,{debug:0});
  peer.on('open',id=>{myId=id;players={};players[myId]=mkPlayer(myId,myName,false);document.getElementById('room-code').textContent=code;document.getElementById('btn-start').style.display='block';show('screen-waiting');renderW();});
  peer.on('connection',onIncoming);peer.on('error',e=>lmsg('Erreur : '+e.type,true));
}
function doJoin(){
  myName=gname();isHost=false;const code=document.getElementById('inp-code').value.trim().toUpperCase();
  if(code.length<4){lmsg('Code invalide.',true);return;}lmsg('Connexion à '+code+'...');
  peer=new Peer(undefined,{debug:0});
  peer.on('open',id=>{myId=id;hostConn=peer.connect(code,{reliable:true});hostConn.on('open',()=>{hostConn.send({type:'hello',name:myName});document.getElementById('cbox').style.display='none';show('screen-waiting');});hostConn.on('data',onFromHost);hostConn.on('close',()=>{if(running){running=false;wmsg('Connexion perdue.');}});});
  peer.on('error',e=>lmsg('Erreur : '+e.type,true));
}
function onIncoming(conn){conn.on('open',()=>{cConns[conn.peer]=conn;conn.on('data',data=>onFromClient(conn.peer,data));conn.on('close',()=>{delete cConns[conn.peer];delete players[conn.peer];bcast({type:'p_leave',id:conn.peer});if(!running)renderW();});});}
function onFromClient(from,msg){
  switch(msg.type){
    case 'hello':players[from]=mkPlayer(from,msg.name,false);
      if(cConns[from])cConns[from].send({type:'welcome',players:Object.values(players).map(p=>({id:p.id,name:p.name}))});
      Object.entries(cConns).forEach(([pid,c])=>{if(pid!==from&&c.open)c.send({type:'p_join',player:{id:from,name:msg.name}});});
      renderW();break;
    case 'pos':if(players[from]&&running){players[from].x=msg.x;players[from].y=msg.y;}break;
  }
}
function onFromHost(msg){
  switch(msg.type){
    case 'welcome':players={};msg.players.forEach(p=>{players[p.id]=mkPlayer(p.id,p.name,false);});renderW();break;
    case 'p_join':players[msg.player.id]=mkPlayer(msg.player.id,msg.player.name,false);renderW();break;
    case 'p_leave':delete players[msg.id];if(!running)renderW();break;
    case 'start':applyStart(msg);break;
    case 'state':if(!running)return;
      msg.players.forEach(p=>{if(p.id===myId){const wasInf=myInf;myInf=p.infected;players[myId].infected=p.infected;players[myId].score=p.score;myScore=p.score;if(!wasInf&&myInf)flashA=1;}else{if(players[p.id])Object.assign(players[p.id],p);else players[p.id]=p;}});
      timeLeft=msg.timeLeft;break;
    case 'end':showResults(msg.results);break;
  }
}
function renderW(){
  const ids=Object.keys(players);
  document.getElementById('plist').innerHTML=ids.map((id,i)=>{const p=players[id];return`<div class="pitem${id===myId?' me':''}"><span>${p.name}${id===myId?' <em style="opacity:.45;font-size:12px">(vous)</em>':''}</span><span class="badge">${p.role||(i===0?'Seigneur':'Villageois')}</span></div>`;}).join('');
  const n=ids.length;if(isHost)document.getElementById('btn-start').disabled=n<2;
  wmsg(n<2?"En attente d'un autre villageois...":`${n} joueur${n>1?'s':''} \u2014 ${isHost?'Commencez quand vous \xeates pr\xeats.':'En attente du seigneur.'}`);
}
function doStart(){
  if(!isHost)return;const ids=Object.keys(players);if(ids.length<2)return;
  const positions={};ids.forEach((id,i)=>{const a=(i/ids.length)*Math.PI*2;positions[id]={x:clamp(GW/2+Math.cos(a)*380+rnd(-30,30),R,GW-R),y:clamp(GH/2+Math.sin(a)*230+rnd(-30,30),R,GH-R)};});
  const infId=ids[Math.floor(Math.random()*ids.length)];
  const m={type:'start',infId,positions};bcast(m);applyStart(m);
}
function applyStart(msg){
  Object.keys(players).forEach(id=>{if(msg.positions[id]){players[id].x=msg.positions[id].x;players[id].y=msg.positions[id].y;}players[id].infected=id===msg.infId;players[id].score=0;players[id].shelterTime=0;players[id].shelterCd=0;});
  assignRoles(players);
  myX=players[myId].x;myY=players[myId].y;myInf=players[myId].infected;myScore=0;
  timeLeft=DUR;running=true;parts=[];flashA=myInf?0.5:0;lastTs=0;lastNet=0;
  resizeCv();showRoleCard(()=>{show('gc');requestAnimationFrame(loop);});
}

/* ══ BOT AI ══ */
function updateBot(p,dt){
  p.wpTimer-=dt;
  if(!p.targetX||p.wpTimer<=0){
    p.wpTimer=1+Math.random()*2.5;
    if(p.infected){
      let nd=Infinity,nx=GW/2,ny=GH/2;
      Object.values(players).filter(q=>!q.infected).forEach(q=>{const d=Math.hypot(q.x-p.x,q.y-p.y);if(d<nd){nd=d;nx=q.x;ny=q.y;}});
      p.targetX=nx+rnd(-25,25);p.targetY=ny+rnd(-25,25);
    } else {
      const infs=Object.values(players).filter(q=>q.infected);
      if(infs.length){
        const near=infs.reduce((b,q)=>Math.hypot(q.x-p.x,q.y-p.y)<Math.hypot(b.x-p.x,b.y-p.y)?q:b);
        const d=Math.hypot(near.x-p.x,near.y-p.y);
        if(d<300&&p.shelterCd<=0&&Math.random()<0.35){
          const sh=SHELTERS[Math.floor(Math.random()*SHELTERS.length)];p.targetX=sh.x;p.targetY=sh.y;
        } else if(d<300){
          p.targetX=clamp(p.x+(p.x-near.x)*2.2+rnd(-60,60),R,GW-R);p.targetY=clamp(p.y+(p.y-near.y)*2.2+rnd(-60,60),R,GH-R);
        } else {p.targetX=rnd(100,GW-100);p.targetY=rnd(80,GH-80);}
      } else {p.targetX=rnd(100,GW-100);p.targetY=rnd(80,GH-80);}
    }
  }
  const dx=p.targetX-p.x,dy=p.targetY-p.y,dist=Math.hypot(dx,dy);
  if(dist>4){const sp=p.infected?170:130;p.x=clamp(p.x+dx/dist*sp*dt,R,GW-R);p.y=clamp(p.y+dy/dist*sp*dt,R,GH-R);}
}

/* ══ GAME LOOP ══ */
function loop(ts){
  if(!running)return;
  const dt=lastTs?Math.min((ts-lastTs)/1000,.05):0;lastTs=ts;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx-=1;if(keys['ArrowRight']||keys['KeyD'])dx+=1;
  if(keys['ArrowUp']||keys['KeyW'])dy-=1;if(keys['ArrowDown']||keys['KeyS'])dy+=1;
  dx+=tVec.x;dy+=tVec.y;const mag=Math.hypot(dx,dy);if(mag>0){dx/=mag;dy/=mag;}
  myX=clamp(myX+dx*SPEED*dt,R,GW-R);myY=clamp(myY+dy*SPEED*dt,R,GH-R);
  players[myId].x=myX;players[myId].y=myY;
  if(flashA>0)flashA=Math.max(0,flashA-dt*1.5);
  if(soloMode)Object.values(players).filter(p=>p.isBot).forEach(p=>updateBot(p,dt));
  if(soloMode||isHost){
    timeLeft=Math.max(0,timeLeft-dt);
    // Update shelter timers
    Object.values(players).forEach(p=>{
      if(p.shelterCd>0){p.shelterCd=Math.max(0,p.shelterCd-dt);return;}
      const s=inShelter(p.x,p.y);
      if(s&&!p.infected){
        p.shelterTime=(p.shelterTime||0)+dt;
        if(p.shelterTime>=SHELTER_MAX){p.shelterCd=SHELTER_CD;p.shelterTime=0;}
      } else {
        p.shelterTime=0;
      }
    });
    checkInf();
    myInf=players[myId].infected;myScore=players[myId].score||0;
    if(!soloMode&&ts-lastNet>1000/NHTZ){bcast({type:'state',players:Object.values(players),timeLeft});lastNet=ts;}
    if(timeLeft<=0||allInf()){
      running=false;const res=computeRes();
      if(!soloMode)bcast({type:'end',results:res});
      try{showResults(res);}catch(e){console.error(e);show('screen-results');}
      return;
    }
  } else {
    if(ts-lastNet>1000/NHTZ){if(hostConn&&hostConn.open)hostConn.send({type:'pos',x:myX,y:myY});lastNet=ts;}
  }
  updParts(dt);
  try{renderGame(ts);}catch(e){console.error('render:',e);}
  requestAnimationFrame(loop);
}

/* ══ INFECTION (protection abri) ══ */
function checkInf(){
  const inf=Object.values(players).filter(p=>p.infected);
  const sain=Object.values(players).filter(p=>!p.infected);
  for(const a of inf)for(const b of sain){
    // Protected if: inside shelter AND no cooldown AND timer not expired
    const isSafe=inShelter(b.x,b.y)&&b.shelterCd<=0&&(b.shelterTime||0)<SHELTER_MAX;
    if(!isSafe&&d2(a,b)<IDIST*IDIST){
      b.infected=true;players[a.id].score=(players[a.id].score||0)+1;
      spawnParts(b.x,b.y);if(b.id===myId)flashA=1;
    }
  }
}
function allInf(){return Object.values(players).every(p=>p.infected);}
function computeRes(){return Object.values(players).map(p=>({id:p.id,name:p.name,infected:p.infected,score:p.score||0,role:p.role||''})).sort((a,b)=>b.score-a.score);}
function spawnParts(wx,wy){for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,s=50+Math.random()*140;parts.push({wx,wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:1.2+Math.random()});}}
function updParts(dt){for(const p of parts){p.wx+=p.vx*dt;p.wy+=p.vy*dt;p.vy+=90*dt;p.life-=p.decay*dt;}parts=parts.filter(p=>p.life>0);}
function resizeCv(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;gSc=Math.min(W/GW,H/GH);gOX=(W-GW*gSc)/2;gOY=(H-GH*gSc)/2;}

/* ══ RENDER ══ */
function renderGame(ts){
  const t=ts/1000;
  ctx.fillStyle='#0e0804';ctx.fillRect(0,0,W,H);
  if(mapLoaded)ctx.drawImage(MAP_IMG,gOX,gOY,GW*gSc,GH*gSc);
  else{ctx.fillStyle='#4a5020';ctx.fillRect(gOX,gOY,GW*gSc,GH*gSc);}
  ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(gOX,gOY,GW*gSc,GH*gSc);
  // Particles
  for(const p of parts){const sx=p.wx*gSc+gOX,sy=p.wy*gSc+gOY;ctx.save();ctx.globalAlpha=p.life*.8;ctx.beginPath();ctx.arc(sx,sy,Math.max(.5,3*p.life*gSc/10),0,Math.PI*2);ctx.fillStyle='#e8604a';ctx.fill();ctx.restore();}
  drawShelters(t);
  Object.values(players).filter(p=>p.id!==myId).forEach(p=>drawP(p,t));
  if(players[myId])drawP(players[myId],t);
  drawHUD(t);
  if(flashA>0){const vg=ctx.createRadialGradient(W/2,H/2,H*.15,W/2,H/2,H*.85);vg.addColorStop(0,'rgba(232,96,74,0)');vg.addColorStop(1,'rgba(201,69,53,'+flashA*.45+')');ctx.save();ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);ctx.restore();}
}

/* ══ DRAW SHELTERS — très visible ══ */
function drawShelters(t){
  const me=players[myId];
  SHELTERS.forEach(s=>{
    const sx=s.x*gSc+gOX, sy=s.y*gSc+gOY, sr=s.r*gSc;
    const pulse=Math.sin(t*2)*0.5+0.5;
    const myDist=me?Math.hypot(me.x-s.x,me.y-s.y):9999;
    const inside=me&&!me.infected&&myDist<s.r&&me.shelterCd<=0&&(me.shelterTime||0)<SHELTER_MAX;
    const onCd=me&&me.shelterCd>0&&myDist<s.r*2;

    // ── Big golden fill circle ──
    ctx.save();
    ctx.globalAlpha=inside?0.28:0.16+pulse*0.06;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle=onCd?'#c94535':'#c8960a';
    ctx.fill();
    ctx.restore();

    // ── Solid outer ring — thick and bright ──
    ctx.save();
    ctx.globalAlpha=inside?1:0.7+pulse*0.25;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.strokeStyle=onCd?'#e85a45':inside?'#d4a820':'#d4a820';
    ctx.lineWidth=inside?4:3;
    ctx.setLineDash([10,6]);ctx.lineDashOffset=-(t*18)%32;
    ctx.stroke();ctx.setLineDash([]);
    ctx.restore();

    // ── House icon ⌂ in center ──
    const icoSize=Math.max(20,sr*0.32);
    ctx.save();
    ctx.font=`bold ${icoSize}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.globalAlpha=inside?0.9:0.5+pulse*0.3;
    ctx.fillStyle=onCd?'#e85a45':'#d4a820';
    ctx.fillText('\u2302',sx,sy);
    ctx.restore();

    // ── Progress arc when inside ──
    if(inside){
      const rem=SHELTER_MAX-(me.shelterTime||0);
      const pct=rem/SHELTER_MAX;
      ctx.save();
      ctx.beginPath();
      ctx.arc(sx,sy,sr+6*gSc,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);
      ctx.strokeStyle=pct>0.4?'#6b9a42':'#e85a45';
      ctx.lineWidth=5;ctx.stroke();
      ctx.restore();
    }

    // ── Name label + timer — with black shadow ──
    const fs=Math.max(10,Math.round(11*gSc));
    const label=inside?`${s.name}  ${Math.ceil(SHELTER_MAX-(me.shelterTime||0))}s`:onCd?`${s.name}  cd ${Math.ceil(me.shelterCd)}s`:s.name;
    ctx.save();
    ctx.font=`bold ${fs}px 'Cinzel',serif`;
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.globalAlpha=0.85;
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillText(label,sx+1,sy-sr-8*gSc+1);
    ctx.fillStyle=inside?(me.shelterTime<SHELTER_MAX*0.4?'#e85a45':'#d4c840'):onCd?'#e85a45':'#d4a820';
    ctx.fillText(label,sx,sy-sr-8*gSc);
    ctx.restore();
  });
}

/* ══ DRAW PLAYER ══ */
function drawP(p,t){
  const sx=p.x*gSc+gOX,sy=p.y*gSc+gOY,sr=R*gSc;
  const isMe=p.id===myId,inf=p.infected;
  const pulse=Math.sin(t*(inf?3:2)+p.x*.003)*.5+.5;
  const s=inShelter(p.x,p.y);
  const safe=s&&!inf&&p.shelterCd<=0&&(p.shelterTime||0)<SHELTER_MAX;
  ctx.save();ctx.translate(sx,sy);
  ctx.globalAlpha=.25;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(sr*.3,sr*.8,sr*.85,sr*.35,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  if(inf){
    const gR=sr*(2.6+pulse*.7);const g=ctx.createRadialGradient(0,0,sr*.4,0,0,gR);
    g.addColorStop(0,'rgba(232,96,74,'+(0.24+pulse*.14)+')');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(0,0,gR,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(0,0,sr*(1.28+pulse*.5),0,Math.PI*2);ctx.strokeStyle='rgba(232,96,74,'+(0.32+pulse*.22)+')';ctx.lineWidth=.9;ctx.stroke();
  }
  if(safe){
    // Gold shimmer ring
    ctx.beginPath();ctx.arc(0,0,sr*1.6,0,Math.PI*2);
    ctx.strokeStyle=`rgba(212,168,32,${0.7+pulse*.25})`;ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,sr*1.9,0,Math.PI*2);
    ctx.strokeStyle=`rgba(212,168,32,${0.3+pulse*.2})`;ctx.lineWidth=1;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(0,0,sr,0,Math.PI*2);
  ctx.fillStyle=inf?'#c94535':safe?'#8a7020':'#576333';ctx.fill();
  ctx.strokeStyle=inf?'rgba(255,210,190,.3)':safe?'rgba(255,220,80,.4)':'rgba(200,230,180,.25)';ctx.lineWidth=sr*.12;ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.32)';ctx.lineWidth=sr*.16;ctx.lineCap='round';
  if(inf){ctx.beginPath();ctx.moveTo(-sr*.32,0);ctx.lineTo(sr*.32,0);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-sr*.32);ctx.lineTo(0,sr*.32);ctx.stroke();}
  else{ctx.beginPath();ctx.arc(0,0,sr*.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.22)';ctx.fill();}
  if(isMe){ctx.beginPath();ctx.arc(0,0,sr*1.72,0,Math.PI*2);ctx.strokeStyle=inf?'rgba(232,96,74,.78)':safe?'rgba(212,168,32,.85)':'rgba(107,122,66,.78)';ctx.lineWidth=1.2;ctx.setLineDash([4,3]);ctx.lineDashOffset=-(t*22)%14;ctx.stroke();ctx.setLineDash([]);}
  const fs=Math.max(8,Math.round(sr*.7));
  ctx.font=(isMe?'600 ':'400 ')+fs+"px 'Cinzel',serif";ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.globalAlpha=.65;ctx.fillStyle='#000';ctx.fillText((isMe?'\u25b6 ':'')+p.name,1,-(sr*1.9)+1);
  ctx.globalAlpha=1;ctx.fillStyle=isMe?'#f5f0e8':'rgba(240,230,200,.72)';ctx.fillText((isMe?'\u25b6 ':'')+p.name,0,-(sr*1.9));
  ctx.restore();
}

/* ══ HUD ══ */
function drawHUD(t){
  const pct=Math.max(0,timeLeft/DUR);
  ctx.fillStyle='rgba(42,31,20,0.84)';ctx.fillRect(gOX,gOY,GW*gSc,28);
  const cn="'Cinzel',serif";ctx.textBaseline='middle';
  const me=players[myId],myRole=me?me.role:'';
  ctx.textAlign='left';ctx.font='500 10px '+cn;ctx.fillStyle=myInf?'#e8604a':'#6b7a42';
  ctx.fillText('\u2740 '+myRole.toUpperCase(),gOX+12,gOY+14);
  ctx.textAlign='center';ctx.font='600 11px '+cn;ctx.fillStyle='rgba(245,240,232,.78)';
  ctx.fillText(Math.ceil(timeLeft)+'s',gOX+GW*gSc/2,gOY+14);
  if(myScore>0){ctx.textAlign='left';ctx.font='500 9px '+cn;ctx.fillStyle='#e8604a';ctx.fillText('\u2740 \u00d7'+myScore,gOX+GW*gSc*0.3,gOY+14);}
  if(me&&!myInf){
    const s=inShelter(me.x,me.y);
    const safe=s&&me.shelterCd<=0&&(me.shelterTime||0)<SHELTER_MAX;
    const onCd=me.shelterCd>0;
    ctx.textAlign='right';ctx.font='600 10px '+cn;
    if(safe){const rem=SHELTER_MAX-(me.shelterTime||0);ctx.fillStyle=rem>4?'#d4a820':'#e85a45';ctx.fillText('\u2302 ABRI '+Math.ceil(rem)+'s',gOX+GW*gSc-12,gOY+14);}
    else if(onCd){ctx.fillStyle='rgba(232,96,74,0.6)';ctx.font='400 9px '+cn;ctx.fillText('\u2302 cd '+Math.ceil(me.shelterCd)+'s',gOX+GW*gSc-12,gOY+14);}
    else{const inf2=Object.values(players).filter(p=>p.infected).length,tot=Object.keys(players).length;ctx.fillStyle='rgba(245,240,232,.45)';ctx.font='400 9px '+cn;ctx.fillText(inf2+'/'+tot+' infect\xe9s',gOX+GW*gSc-12,gOY+14);}
  }
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(gOX,gOY+GH*gSc,GW*gSc,3);
  ctx.fillStyle=pct>.5?'#576333':pct>.25?'#7a6020':'#c94535';ctx.fillRect(gOX,gOY+GH*gSc,GW*gSc*pct,3);
}

/* ══ RESULTS ══ */
function showResults(results){
  running=false;
  const me=results.find(r=>r.id===myId),survived=me&&!me.infected,infCnt=results.filter(r=>r.infected).length,epidemic=results.every(r=>r.infected);
  const title=document.getElementById('rtitle');
  if(survived){title.textContent='Survivant !';title.style.color='#576333';}
  else if(epidemic){title.textContent='\u00c9pid\u00e9mie !';title.style.color='#c94535';}
  else{title.textContent='Contamin\u00e9 !';title.style.color='#c94535';}
  const sub=document.getElementById('r-sub');if(sub)sub.textContent=infCnt+' villageois sur '+results.length+' furent infect\u00e9s';
  const statsEl=document.getElementById('r-stats');
  if(statsEl){const top=results.reduce((b,r)=>r.score>b.score?r:b,results[0]);
  statsEl.innerHTML=[{l:'Infect\u00e9s',v:infCnt+'/'+results.length},{l:'Dur\u00e9e',v:DUR+'s'},{l:'Pire cas',v:top.score>0?top.name.split(' ')[0]:'\u2014'}].map((s,i,a)=>`<div style="flex:1;padding:12px 8px;text-align:center;${i<a.length-1?'border-right:0.7px solid var(--bd);':''}"><div style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--ink)">${s.v}</div><div style="font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);margin-top:4px">${s.l}</div></div>`).join('');}
  const poemEl=document.getElementById('r-poem');
  if(poemEl){const poems=['Voici la joyeuse veill\u00e9e,\nO\u00f9 dans les airs, \u00e0 la vol\u00e9e\u2026','No\u00ebl\u00a0! Voici la f\u00eate \u00e9trange\u00a0!','Et du Cabaret \u00e0 l\'\u00c9glise,\nChacun, selon sa foi, se grise\u2026'];poemEl.textContent=poems[Math.floor(Math.random()*poems.length)];}
  const listEl=document.getElementById('rlist');
  if(listEl)listEl.innerHTML=results.map((r,i)=>`<div class="rrow ${r.infected?'inf':'sur'}${r.id===myId?' me':''}"><span class="rn">${i+1}</span><span class="rname">${r.name}${r.id===myId?' \u2605':''}</span><span class="rst">${r.role||(r.infected?'Infect\u00e9':'Sain')}</span><span class="rsc">\u2740 \u00d7${r.score}</span></div>`).join('');
  show('screen-results');const el=document.getElementById('screen-results');if(el)el.scrollTop=0;
}

/* ══ BACK ══ */
function doBack(){
  running=false;soloMode=false;if(peer){try{peer.destroy();}catch(e){}peer=null;}
  hostConn=null;cConns={};players={};myId=null;
  document.getElementById('cbox').style.display='';document.getElementById('btn-start').style.display='none';
  document.getElementById('inp-code').value='';document.getElementById('join-form').classList.remove('open');
  lmsg('');show('screen-lobby');
}

/* ══ INPUT ══ */
window.addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();tStart={x:e.touches[0].clientX,y:e.touches[0].clientY};tVec={x:0,y:0};},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!tStart)return;const dx=e.touches[0].clientX-tStart.x,dy=e.touches[0].clientY-tStart.y;const m=Math.hypot(dx,dy);tVec=m>12?{x:dx/m,y:dy/m}:{x:0,y:0};},{passive:false});
canvas.addEventListener('touchend',()=>{tStart=null;tVec={x:0,y:0};},{passive:false});
window.addEventListener('resize',()=>{if(running)resizeCv();});

</script>
